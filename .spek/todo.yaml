sections:
  testing:
    name: Testing
    items:
    - |-
      Consolidate and reduce the test suite to keep it manageable, accepting slightly reduced coverage.
    - |-
      Add test for module_set with duplicate module name; module_set lacks the deduplication that module_add and module_remove have and this inconsistency is untested
  containerization:
    name: Containerization
    items:
    - |-
      Add specs/docker/dockerfile.md — Dockerfile best practices (layer ordering, cache efficiency, non-root user, minimal base images).
    - Add specs/docker/compose.md — docker-compose / compose file conventions.
    - |-
      Add specs/docker/podman.md — podman-specific conventions and differences from Docker.
    - 'Add containerization profiles: containers/docker, containers/podman.'
  persistence:
    name: Persistence
    items:
    - |-
      Add specs/persistence/base.md — tool-agnostic persistence conventions (migrations, connection lifecycle, no raw queries in business logic).
    - 'Add persistence profiles: persistence/sql, persistence/redis.'
  configuration:
    name: Configuration
    items:
    - |-
      Add specs/config/python.md — Pydantic settings, single instantiation point; decide whether to fold or keep separate from specs/python/config.md.
    - |-
      Add specs/config/dotnet.md — appsettings.json structure, secrets management, IOptions<T> pattern.
  ai-stances:
    name: AI stances
    items:
    - |-
      Have /spek-plan and /spek-build read the active stance from session.yaml and adjust behavior accordingly (e.g. collaborative stance → more trade-offs surfaced in plan).
    - |-
      Add additional stances: performance.yaml, security.yaml, mentor.yaml (explain everything, teach as you go).
  conventions:
    name: File naming conventions
    items:
    - |-
      Add specs/conventions/naming.md — file and directory naming conventions (kebab-case, snake_case, .yaml vs .yml, src/ layout).
    - |-
      Add specs/conventions/python-structure.md — package vs module, src/ layout, entry points.
    - |-
      Add specs/conventions/project-structure.md — repo root conventions, monorepo guidance, dotfile conventions.
  refactoring:
    name: Refactoring
    items:
    - |-
      Add specs/refactoring/base.md — when to refactor, refactor as a separate commit, test coverage before refactoring.
    - |-
      Add specs/refactoring/python.md — Python extraction patterns, naming, avoiding over-abstraction.
    - |-
      Refactor SessionState to follow the same singleton pattern as SpekConfig: add initialize(), instance()/current(), and get() classmethods so session state can be accessed without passing it through every call.
  external-sources:
    name: External spec sources
    items:
    - |-
      Implement remote source fetching: wire gh:: and gl:: paths in SourceSpec to spek sync --pull so modules are cloned/fetched from their declared remote before resolving; local sources already work.
    - |-
      Decide how spek init / spek profile apply should work when profiles live in an external source.
    - |-
      Update `spek ref search` and `spek ref read` to search and retrieve reference entries from all configured sources, not just the local library.
    - |-
      Block or warn when  is given a reserved namespace name ( or ); these are built-in namespaces and overwriting them should require .
    - |-
      Block or warn when `spek source add` is given a reserved namespace name (`spek` or `project`); these are built-in namespaces and overwriting them should require `--force`.
    - |-
      Design canonical source identifiers: each source has a stable identity (e.g. its URL or registered name) separate from the user's local alias, so profiles can reference cross-source modules without knowing how the user named the source locally.
  frontend:
    name: Frontend patterns
    items:
    - |-
      Add specs/systems/basic-crud.md with full CRUD pattern conventions and matching reference entries for frontend/backend/htmx variants; use Jinja templating for conditional htmx content.
  spek-audit:
    name: spek-audit
    items:
    - |-
      Add /spek-audit skill: AI pass checking repository against specs writes findings to .spek/audit.yaml, triage phase walks findings one-by-one with resolution options, retro phase closes and deletes audit file.
    - |-
      Add /spek-why skill: given a specific AI decision the user questions, explain the rule or gap that drove it (without reverting the change), then suggest a concrete spec edit or new spek module to prevent it in future sessions.
  spek-split:
    name: Plan splitting
    items:
    - |-
      Add /spek-split skill: decompose a large plan into sub-plans stored in .spek/plans/<group>/, with index.yaml tracking group goal and per-plan status.
    - |-
      Add ## Group convention to session.yaml for linking sub-plans back to their group; extend retro to mark sub-plan entries done in index.yaml.
    - |-
      Loading a sub-plan: user manually moves a plan file to session.yaml; no new skill needed.
  cleanup:
    name: Cleanup
    items:
    - |-
      Add specs/workflow/cleanup.md — standalone spec for identifying and removing dead code, stale TODOs, commented-out blocks, and unreferenced files.
    - |-
      module_set does not deduplicate: passing the same module name twice writes it twice into config.modules and reports incorrect count; add dict.fromkeys deduplication to module_set as done for module_add and module_remove
    - |-
      spek check gives misleading 'Module does not resolve in any source' error when the module's source is remote (gh::/gl::) and unfetchable; improve message to indicate the source type is the root cause
    - |-
      Replace all uses of 'import json as json_mod' with plain 'import json'; the alias was added to avoid shadowing a parameter named 'json', but all affected commands use 'as_json' for that parameter instead.
  ai-tools:
    name: AI tool support
    items:
    - |-
      Add Codex support: spec modules, profile, and any workflow/skill adjustments needed for OpenAI Codex as an AI assistant target.
