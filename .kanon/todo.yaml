sections:
  testing:
    name: Testing
    items:
    - |-
      Consolidate and reduce the test suite to keep it manageable, accepting slightly reduced coverage.
    - |-
      `test_sync_pull_calls_pull_on_all_sources` name is misleading — `kanon sync --pull` now only pulls sources referenced by active kanons/stances, not all configured sources; test should be renamed and extended to assert unreferenced sources are skipped (finding f20 from review p6).
  containerization:
    name: Containerization
    items:
    - |-
      Add kanons/docker/dockerfile.md — Dockerfile best practices (layer ordering, cache efficiency, non-root user, minimal base images).
    - Add kanons/docker/compose.md — docker-compose / compose file conventions.
    - |-
      Add kanons/docker/podman.md — podman-specific conventions and differences from Docker.
    - 'Add containerization profiles: containers/docker, containers/podman.'
  persistence:
    name: Persistence
    items:
    - |-
      Add kanons/persistence/base.md — tool-agnostic persistence conventions (migrations, connection lifecycle, no raw queries in business logic).
    - 'Add persistence profiles: persistence/sql, persistence/redis.'
  configuration:
    name: Configuration
    items:
    - |-
      Add kanons/config/python.md — Pydantic settings, single instantiation point; decide whether to fold or keep separate from kanons/python/config.md.
    - |-
      Add kanons/config/dotnet.md — appsettings.json structure, secrets management, IOptions<T> pattern.
  ai-stances:
    name: AI stances
    items:
    - |-
      Have /kanon-plan and /kanon-build read the active stance from session.yaml and adjust behavior accordingly (e.g. collaborative stance → more trade-offs surfaced in plan).
    - |-
      Add additional stances: performance.yaml, security.yaml, mentor.yaml (explain everything, teach as you go).
  conventions:
    name: File naming conventions
    items:
    - |-
      Add kanons/conventions/naming.md — file and directory naming conventions (kebab-case, snake_case, .yaml vs .yml, src/ layout).
    - |-
      Add kanons/conventions/python-structure.md — package vs module, src/ layout, entry points.
    - |-
      Add kanons/conventions/project-structure.md — repo root conventions, monorepo guidance, dotfile conventions.
  refactoring:
    name: Refactoring
    items:
    - |-
      Add kanons/refactoring/base.md — when to refactor, refactor as a separate commit, test coverage before refactoring.
    - |-
      Add kanons/refactoring/python.md — Python extraction patterns, naming, avoiding over-abstraction.
    - |-
      Refactor SessionState to follow the same singleton pattern as KanonConfig: add initialize(), instance()/current(), and get() classmethods so session state can be accessed without passing it through every call.
    - |-
      Convert relative imports to absolute in commands/session/ and commands/todo/ subpackages (violates python/style)
  external-sources:
    name: External kanon sources
    items:
    - |-
      Decide how kanon init / kanon profile apply should work when profiles live in an external source.
    - |-
      Update `kanon ref search` and `kanon ref read` to search and retrieve reference entries from all configured sources, not just the local library.
    - |-
      Block or warn when `kanon source add` is given a reserved namespace name (`kanon` or `project`); these are built-in namespaces and overwriting them should require `--force`.
    - |-
      Design canonical source identifiers: each source has a stable identity (e.g. its URL or registered name) separate from the user's local alias, so profiles can reference cross-source kanons without knowing how the user named the source locally.
    - |-
      Implement a cache registry (e.g. a manifest file in sources_cache_path) so kanon cache status can report metadata like source URL, cached ref, and last-pulled timestamp without walking the filesystem or re-opening git repos.
    - |-
      `kanon add` calls `_pull_sources_for_modules(new_kanons)` where `new_kanons` includes pre-existing config kanons; if any existing kanon references a since-removed source, `sources[src]` raises an unhandled `KeyError` (finding f19 from review p6).
    - |-
      Have `kanon init`, `kanon onboard`, and related setup commands auto-generate `.kanon/.gitignore` with appropriate entries (e.g. ignoring cached/ephemeral files that shouldn't be committed).
  frontend:
    name: Frontend patterns
    items:
    - |-
      Add kanons/systems/basic-crud.md with full CRUD pattern conventions and matching reference entries for frontend/backend/htmx variants; use Jinja templating for conditional htmx content.
  kanon-split:
    name: Plan splitting
    items:
    - |-
      Add /kanon-split skill: decompose a large plan into sub-plans stored in .kanon/plans/<group>/, with index.yaml tracking group goal and per-plan status.
    - |-
      Add ## Group convention to session.yaml for linking sub-plans back to their group; extend retro to mark sub-plan entries done in index.yaml.
    - |-
      Loading a sub-plan: user manually moves a plan file to session.yaml; no new skill needed.
  cleanup:
    name: Cleanup
    items:
    - |-
      Add kanons/workflow/cleanup.md — standalone kanon for identifying and removing dead code, stale TODOs, commented-out blocks, and unreferenced files.
  ai-tools:
    name: AI tool support
    items:
    - |-
      Add MCP server support: expose kanon CLI functionality (session, todo, ref, kanon) as MCP tools so AI assistants can interact with kanon directly.
